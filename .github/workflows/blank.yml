name: Build and Release Nim (Multi-platform)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.0.0'

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: nim c -d:release -o:hello hello.nim

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: nim c -d:release -o:hello.exe hello.nim

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x hello
          tar czvf hello-${{ runner.os }}.tar.gz hello

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: 7z a hello-Windows.zip hello.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-${{ runner.os }}
          path: |
            hello-*.tar.gz
            hello-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4  # ← 加这一行！

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List files
        run: ls -la artifacts/

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(date +%Y%m%d-%H%M%S)"
          echo "Creating release: $VERSION"
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes "多平台自动构建" \
            artifacts/*
