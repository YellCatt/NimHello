name: Build and Release Nim (Multi-platform + MIPS)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
          - os: ubuntu-latest
            target: mips
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.0.0'

      # ========== 原生平台编译 ==========
      - name: Build (Linux)
        if: matrix.target == 'linux'
        run: |
          nim c -d:release -o:hello-linux hello.nim
          tar czvf hello-linux.tar.gz hello-linux

      - name: Build (Windows)
        if: matrix.target == 'windows'
        run: |
          nim c -d:release -o:hello.exe hello.nim
          7z a hello-windows.zip hello.exe

      - name: Build (macOS)
        if: matrix.target == 'macos'
        run: |
          nim c -d:release -o:hello-macos hello.nim
          tar czvf hello-macos.tar.gz hello-macos

      # ========== MIPS 交叉编译 ==========
      - name: Install MIPS toolchain
        if: matrix.target == 'mips'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mipsel-linux-gnu g++-mipsel-linux-gnu

      - name: Build (MIPS)
        if: matrix.target == 'mips'
        run: |
          nim c --cpu:mipsel --os:linux \
            --cc:gcc \
            --gcc.exe:mipsel-linux-gnu-gcc \
            --gcc.linkerexe:mipsel-linux-gnu-gcc \
            --passC:"-O2 -EL -msoft-float" \
            --passL:"-lpthread -ldl" \
            -d:release \
            -d:ssl \
            --mm:arc \
            --threads:off \
            -o:hello-mips hello.nim
          tar czvf hello-mips.tar.gz hello-mips

      # ========== 上传产物 ==========
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-${{ matrix.target }}
          path: |
            hello-*.tar.gz
            hello-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List files
        run: ls -la artifacts/

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(date +%Y%m%d-%H%M%S)"
          echo "Creating release: $VERSION"
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes "多平台自动构建（含 MIPS）" \
            artifacts/*
