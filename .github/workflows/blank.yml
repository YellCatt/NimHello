name: Build Nim

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.0.0'

      - name: Build hello.nim
        run: nim c -o:hello hello.nim

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: hello
          path: hello
