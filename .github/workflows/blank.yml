name: Build and Release Nim (Multi-platform + 极路由2)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
          - os: ubuntu-latest
            target: hiwifi2
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.0.0'

      # ========== Linux ==========
      - name: Build (Linux)
        if: matrix.target == 'linux'
        run: |
          nim c -d:release -o:hello-linux hello.nim
          tar czvf hello-linux.tar.gz hello-linux

      # ========== Windows ==========
      - name: Build (Windows)
        if: matrix.target == 'windows'
        run: |
          nim c -d:release -o:hello.exe hello.nim
          7z a hello-windows.zip hello.exe

      # ========== macOS ==========
      - name: Build (macOS)
        if: matrix.target == 'macos'
        run: |
          nim c -d:release -o:hello-macos hello.nim
          tar czvf hello-macos.tar.gz hello-macos

      # ========== 极路由2 (mt7620) ==========
      - name: Install OpenWrt SDK (mt7620)
        if: matrix.target == 'hiwifi2'
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils
          
          wget -q https://downloads.openwrt.org/releases/23.05.3/targets/ramips/mt7620/openwrt-sdk-23.05.3-ramips-mt7620_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          
          mkdir -p openwrt-sdk
          tar xf openwrt-sdk-*.tar.xz -C openwrt-sdk --strip-components=1
          
          TOOLCHAIN_DIR=$(find openwrt-sdk/staging_dir -name "toolchain-*" -type d | head -1)
          echo "$PWD/$TOOLCHAIN_DIR/bin" >> $GITHUB_PATH
          echo "STAGING_DIR=$PWD/openwrt-sdk/staging_dir" >> $GITHUB_ENV

      - name: Build (极路由2)
        if: matrix.target == 'hiwifi2'
        run: |
          nim c --cpu:mipsel --os:linux \
            --cc:gcc \
            --gcc.exe:mipsel-openwrt-linux-musl-gcc \
            --gcc.linkerexe:mipsel-openwrt-linux-musl-gcc \
            --passC:"-O2 -EL -msoft-float" \
            --passL:"-lpthread -ldl" \
            -d:release \
            -d:ssl \
            --mm:arc \
            --threads:off \
            -o:hello-hiwifi2 hello.nim
          tar czvf hello-hiwifi2.tar.gz hello-hiwifi2

      # ========== 上传产物 ==========
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-${{ matrix.target }}
          path: |
            hello-*.tar.gz
            hello-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List files
        run: ls -la artifacts/

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(date +%Y%m%d-%H%M%S)"
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes "多平台自动构建（含极路由2）" \
            artifacts/*
