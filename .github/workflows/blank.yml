name: Build and Release Nim

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.0.0'

      - name: Build
        run: nim c -d:release -o:hello hello.nim

      - name: Package
        run: |
          chmod +x hello
          tar czvf hello-linux.tar.gz hello

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ github.run_number }}" \
            --title "Release v${{ github.run_number }}" \
            --notes "自动构建的 Release" \
            hello-linux.tar.gz
